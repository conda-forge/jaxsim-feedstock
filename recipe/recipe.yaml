schema_version: 1

context:
  name: jaxsim
  version: "0.9.0"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/jaxsim-${{ version }}.tar.gz
  sha256: 719e58d54c179c1aab9f071c83723b5d480915754d835fe5ba30d3993f84616e

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    # From build-system.requires:
    - hatchling
    - hatch-vcs
  run:
    # Main dependencies:
    - python >=${{ python_min }}
    - coloredlogs
    - icub-models
    - jax >=0.4.34
    - jaxlib >=0.4.34
    - jaxlie >=1.3.0
    - jax-dataclasses >=1.4.0
    - optax >=0.2.3
    - pptree
    - qpax
    - rod >=0.4.1
    - trimesh
    - typing_extensions
    # Extra [viz] dependencies:
    - lxml
    - mediapy
    - mujoco >=3.0.0
    - scipy

tests:
  - python:
      imports:
        - jaxsim
      pip_check: true
      python_version: ${{ python_min }}
  - files:
      source:
        - tests/*
    requirements:
      run:
        - python ${{ python_min }}.*
        - git
        - pip
        - idyntree >=12.4
        - pytest >=6.0
        - pytest-benchmark
        - pytest-icdiff
        - robot_descriptions
    script:
      - test "$(pip list | grep jaxsim | awk '{print $2}')" == "$PKG_VERSION"
      - pytest -vv tests/test_simulations.py -k "not cartpole"

about:
  summary: A differentiable physics engine and multibody dynamics library for control and robot learning.
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/gbionics/jaxsim
  repository: https://github.com/ami-iit/jaxsim

extra:
  recipe-maintainers:
    - xela-95
    - flferretti
    - diegoferigo
    - traversaro
